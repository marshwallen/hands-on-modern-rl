<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 210" width="520" height="210">
  <defs>
    <style>
      text { font-family: 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#f57c00"/>
    </marker>
  </defs>

  <!-- Frame t -->
  <rect x="10" y="30" width="220" height="140" fill="#1a1a2e" rx="4"/>
  <line x1="120" y1="30" x2="120" y2="170" stroke="#444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="20" y="65" width="8" height="35" fill="#e0e0e0" rx="3"/>
  <rect x="212" y="85" width="8" height="35" fill="#e0e0e0" rx="3"/>
  <circle cx="95" cy="88" r="6" fill="#ff5555"/>
  <circle cx="95" cy="88" r="11" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Frame t</text>

  <!-- Frame t+1 -->
  <rect x="270" y="30" width="220" height="140" fill="#1a1a2e" rx="4"/>
  <line x1="380" y1="30" x2="380" y2="170" stroke="#444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="280" y="65" width="8" height="35" fill="#e0e0e0" rx="3"/>
  <rect x="472" y="85" width="8" height="35" fill="#e0e0e0" rx="3"/>
  <circle cx="358" cy="91" r="6" fill="#ff5555"/>
  <circle cx="358" cy="91" r="11" fill="none" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="380" y="22" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Frame t+1</text>

  <!-- Arrow between frames -->
  <line x1="235" y1="100" x2="262" y2="100" stroke="#f57c00" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Annotation -->
  <text x="260" y="198" text-anchor="middle" font-size="12" fill="#f57c00">84×84 = 7056 像素，仅球移动了约 4 个像素（差异 &lt; 0.06%）</text>
</svg>
